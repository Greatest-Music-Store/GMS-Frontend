<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">

  <div class="w-full max-w-md rounded-2xl bg-white p-8 shadow-2xl">

    <h2 class="text-2xl font-bold text-[#5c3a21] text-center">
      Você tem certeza?
    </h2>

    <p class="mt-3 text-center text-gray-600">
      Esta ação não poderá ser desfeita.
    </p>
    <div class="mt-8 flex justify-center gap-4">

      <button
        type="button"
        class="px-6 py-3 rounded-xl bg-gray-200 text-gray-700 hover:bg-gray-300" (click)="close.emit()">
        Não
      </button>

      <button
        type="button"
        class="px-6 py-3 rounded-xl bg-red-600 text-white hover:bg-red-700" (click)="close.emit()">
        Sim, excluir
      </button>

    </div>

  </div>

</div>
