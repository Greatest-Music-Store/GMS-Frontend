<main
    class=" bg-[url(https://brqcyvmsflpddaqxqjjl.supabase.co/storage/v1/object/public/Evento/bglogin.png)] bg-no-repeat bg-cover bg-center h-dvh flex items-center justify-center text-[#42240D]">
    <div class="flex-col justify-center m-auto">
        <form  (ngSubmit)="forgotPassword()"
            class="bg-white flex-col flex shadow-2xl gap-8 p-12 rounded-xl font-[Playfair_Display]">
            <div class="">
                <div class="text-center">
                    <h1 class="text-2xl text-[#251912] font-semibold">Digite seu email</h1>
                </div>
                <div class="gap-4">
                    <div class="text-center text-[#251912] px-3 pt-3 ">
                        <h1 class="text-2xl font-semibold">Bem Vindo de volta</h1>
                        <p class="tracking-widest text-1xl">Entre na sua harmonia</p>
                    </div>
                    <div class="flex-col mt-4 ">
                        <label class="text-sm font-semibold text-[#50443D]">
                            Email
                        </label>
                        <div
                            class="mt-2 flex items-center gap-3 rounded-md border border-[#D4C3B9] bg-[#FFF1EA] px-4 py-3 text-[#82746C]">
                            <ng-icon name="tdesignMail" />
                            <input type="email" placeholder="email@email.co" formControlName="email"
                                autoComplete="email" id="email" class="w-full bg-transparent text-[#82746C] outline-none
                    placeholder:text-[#82746C]" />
                        </div>
                    </div>
                    <div>
                            <button type="submit"
                                class="btn btn-wide border-[0px] bg-[#5C3A21] mt-4">
                                Entrar
                            </button>
                        </div>
                </div>
            </div>


        </form>
    </div>


</main>
