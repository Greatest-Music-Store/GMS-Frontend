<main
    class="bg-[url(https://brqcyvmsflpddaqxqjjl.supabase.co/storage/v1/object/public/Evento/bglogin.png)] bg-no-repeat bg-cover bg-center min-h-dvh flex items-center justify-center text-[#42240D] p-4">
    <div class="w-full max-w-2xl">
        <div class="bg-[#FAF6F0] shadow-2xl p-12 rounded-xl font-[Playfair_Display]">
            <div class="text-left pb-4">
                <h1 class="text-4xl font-semibold">Crie sua Conta</h1>
                <p>Inicie sua jornada na curadoria mais exclusiva de instrumentos.</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="register()">
                <div class="my-4">
                    <label>Nome Completo</label>
                    <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                        <input type="text" formControlName="name" placeholder="Jorge da Silva"
                            class="w-full bg-transparent text-[#82746C] outline-none" />
                    </div>
                </div>

                <div class="my-4">
                    <label>CPF</label>
                    <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                        <input type="text" formControlName="cpf" placeholder="607.670.067-67"
                            class="w-full bg-transparent text-[#82746C] outline-none" />
                    </div>
                </div>

                <div class="my-4">
                    <label>Telefone</label>
                    <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                        <input type="text" formControlName="phone" placeholder="(51) 99999-9999"
                            class="w-full bg-transparent text-[#82746C] outline-none" />
                    </div>
                </div>

                <div class="my-4">
                    <label>Email</label>
                    <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                        <input type="email" formControlName="email" placeholder="email@email.com" autocomplete="email"
                            class="w-full bg-transparent text-[#82746C] outline-none" />
                    </div>
                </div>

                <div class="my-4 flex gap-4">
                    <div class="w-full">
                        <label>Senha</label>
                        <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                            <input type="password" formControlName="password" placeholder="********"
                                autocomplete="new-password" class="w-full bg-transparent text-[#82746C] outline-none" />
                        </div>
                    </div>

                    <div class="w-full">
                        <label>Confirmar senha</label>
                        <div class="mt-2 rounded-md bg-[#F5E9DA] px-4 py-3">
                            <input type="password" formControlName="confirmPassword" placeholder="********"
                                autocomplete="new-password" class="w-full bg-transparent text-[#82746C] outline-none" />
                        </div>
                    </div>
                </div>

                <div class="flex items-start gap-4 my-4">
                    <input type="checkbox" class="mt-1" />

                    <p>
                        Eu concordo com os
                        <a href="#" class="font-bold">Termos e Condições</a>
                        e a
                        <a href="#" class="font-bold">Política de Privacidade</a>
                        da Greatest Music Store.
                    </p>
                </div>

                <button type="submit" class="w-full rounded-md bg-[#5C3A21] py-3 text-white font-semibold">
                    Criar conta
                </button>
            </form>

            <div class="my-4">
                <p>
                    Já possui uma conta?
                    <a href="/login" class="font-bold">Entre aqui</a>
                </p>
            </div>
        </div>
    </div>
</main>
