<main class="bg-linear-to-tr from-orange-200 to-yellow-900 min-h-screen flex items-center justify-center">
    <div class="flex-col justify-center">
        <div class="bg-white flex-col gap-8 p-12 rounded-xl font-[Playfair_Display]">
            <div class="">
                <div class="text-center">
                    <h1 class="text-2xl text-[#251912] font-semibold">Greatest Music Store</h1>
                    <p class="italic font-thin text-[#50443D] font-[Montserrat]">O melhor da musica para todos</p>

                </div>
                <div class="gap-4">
                    <div class="text-center text-[#251912] px-3 pt-3 my-8">
                        <h1 class="text-2xl font-semibold">Bem Vindo de volta</h1>
                        <p class="tracking-widest text-1xl">Entre na sua harmonia</p>
                    </div>

                    <div class="flex-col ">
                        <label class="text-sm font-semibold text-[#50443D]">
                            Email
                        </label>
                        <div
                            class="mt-2 flex items-center gap-3 rounded-md border border-[#D4C3B9] bg-[#FFF1EA] px-4 py-3 text-[#82746C]">
                            <ng-icon name="tdesignMail" />
                            <input type="email" placeholder="email@email.co" autoComplete="current-password" required
                                class="w-full bg-transparent text-[#82746C] outline-none
                    placeholder:text-[#82746C]" />
                        </div>
                    </div>
                    <div class="flex-col">

                        <div>
                            <label class="text-sm font-semibold text-[#50443D]">
                                Senha
                            </label>
                        </div>
                        <div
                            class="mt-2 flex items-center gap-3 rounded-md border border-[#D4C3B9] bg-[#FFF1EA] px-4 py-3 text-[#82746C]">
                            <ng-icon name="tdesignLockOn" />
                            <input type="password" value={password} placeholder="********"
                                autoComplete="current-password" required class="w-full bg-transparent text-[#82746C] outline-none
                    placeholder:text-[#82746C]" />
                        </div>
                        <div>
                            <label class="text-sm font-semibold text-xs mt-3">
                                <a href="/forgot-password" class="text-[#7B5900] text-right float-right">
                                    Esqueceu a senha?
                                </a>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</main>
