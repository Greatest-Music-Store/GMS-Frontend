<header class="border-b border-[#F0F0F0] bg-white shadow-sm">
  <div class="flex flex-col gap-4 py-4 lg:flex-row lg:items-center lg:px-8">
    <a routerLink="/home" class="shrink-0 text-2xl font-bold font-[Playfair_Display] text-[#42240D]">
      Greatest Music Store
    </a>



    <div class="relative min-w-0 flex-1 px-6">
      <input type="text" placeholder="Buscar produtos" [formControl]="searchControl" (keydown.enter)="search()"
        class="w-full rounded-md border border-[#E7D8C7] bg-[#FFF1EA] px-4 py-2 text-[#50443D] outline-none transition focus:border-[#FF5A00]">

      <!-- @if (suggestions.length > 0) {
        <div class="absolute top-full left-0 right-0 text-black bg-white border rounded-md shadow-lg z-50">
          @for (product of suggestions; track product.productId) {
            <button
              type="button"
              class="w-full text-left px-4 py-2 hover:bg-gray-100"
              (click)="selectSuggestion(product)">
              {{ product.name }}
            </button>
          }
        </div>
      } -->
    </div>

    <nav class="flex shrink-0 items-center gap-4 text-[#50443D]">


      @if (authStore.isLogged()) {
      <a routerLink="/favorite"
        class="grid h-10 w-10 place-items-center rounded-md transition hover:bg-[#FFF1EA] hover:text-[#FF5A00]"
        aria-label="Favoritos" title="Favoritos">
        <ng-icon name="tdesignHeart" size="26"></ng-icon>
      </a>
      <a routerLink="/cart"
        class="grid h-10 w-10 place-items-center rounded-md transition hover:bg-[#FFF1EA] hover:text-[#FF5A00]"
        aria-label="Carrinho" title="Carrinho">
        <ng-icon name="tdesignCart" size="26"></ng-icon>
      </a>
      <div class="relative">

        <button type="button"
          class="max-w-44 rounded-md bg-[#FFF1EA] px-3 py-2 font-[Montserrat] text-sm font-semibold text-[#42240D] transition hover:bg-[#FFE4D8]"
          [attr.aria-expanded]="userMenuOpen()" aria-haspopup="menu" (click)="toggleUserMenu()">
          <div class="flex items-center text-[#50443D] gap-2">
            <ng-icon name="tdesignUserCircle" size="26"></ng-icon>
            {{ authStore.userName() || 'User' }}
          </div>
        </button>

        @if (userMenuOpen()) {
        <div class="absolute right-0 z-30 mt-2 w-36 rounded-md border border-[#E7D8C7] bg-white p-2 shadow-lg"
          role="menu">
          <button type="button"
            class="w-full rounded-md cursor-pointer px-3 py-2 text-left font-[Montserrat] text-sm font-semibold text-[#42240D] transition hover:bg-[#FFF1EA]"
            role="menuitem" (click)="logout()">
            Sair
          </button>
        </div>
        }
      </div>
      } @else {
      <div class="items-center flex gap-2">
        <ng-icon name="tdesignUserCircle" size="26"></ng-icon>
        <div class="flex  gap-1 font-[Montserrat] text-sm font-semibold">
          <a routerLink="/login" class="text-[#42240D] transition hover:text-[#FF5A00]">
            Entre
          </a>
          <span class="text-[#8A817A]">ou</span>
          <a routerLink="/register" class="text-[#42240D] transition hover:text-[#FF5A00]">
            Cadastre-se
          </a>
        </div>
      </div>
      }
    </nav>
  </div>
</header>
