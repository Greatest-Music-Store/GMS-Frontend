<header class="border-b border-[#F0F0F0] bg-white shadow-sm">
  <div class="flex flex-col gap-4 px-4 py-4 lg:flex-row lg:items-center lg:px-8">
    <a routerLink="/home" class="shrink-0 text-3xl font-bold text-[#42240D]">
      Greatest Music Store
    </a>

    <nav class="flex items-center gap-4 overflow-x-auto font-[Montserrat] text-sm font-semibold text-[#50443D] lg:text-base">
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Sopros</a>
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Cordas</a>
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Percussão</a>
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Teclas</a>
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Discos</a>
      <a routerLink="/busca" class="transition hover:text-[#FF5A00]">Mais...</a>
    </nav>

    <div class="min-w-0 flex-1">
      <input
        type="text"
        placeholder="Buscar produtos"
        class="w-full rounded-md border border-[#E7D8C7] bg-[#FFF1EA] px-4 py-2 text-[#50443D] outline-none transition focus:border-[#FF5A00]">
    </div>

    <nav class="flex shrink-0 items-center gap-4 text-[#50443D]">
      <a routerLink="/favorite" class="grid h-10 w-10 place-items-center rounded-md transition hover:bg-[#FFF1EA] hover:text-[#FF5A00]" aria-label="Favoritos" title="Favoritos">
        <ng-icon name="tdesignHeart" size="26"></ng-icon>
      </a>
      <a routerLink="/cart" class="grid h-10 w-10 place-items-center rounded-md transition hover:bg-[#FFF1EA] hover:text-[#FF5A00]" aria-label="Carrinho" title="Carrinho">
        <ng-icon name="tdesignCart" size="26"></ng-icon>
      </a>

      @if (authStore.isLogged()) {
      <div class="relative">
        <button
          type="button"
          class="max-w-44 truncate rounded-md bg-[#FFF1EA] px-3 py-2 font-[Montserrat] text-sm font-semibold text-[#42240D] transition hover:bg-[#FFE4D8]"
          [attr.aria-expanded]="userMenuOpen()"
          aria-haspopup="menu"
          (click)="toggleUserMenu()">
          {{ authStore.userName() || 'Usuário' }}
        </button>

        @if (userMenuOpen()) {
        <div class="absolute right-0 z-30 mt-2 w-36 rounded-md border border-[#E7D8C7] bg-white p-2 shadow-lg" role="menu">
          <button
            type="button"
            class="w-full rounded-md px-3 py-2 text-left font-[Montserrat] text-sm font-semibold text-[#42240D] transition hover:bg-[#FFF1EA]"
            role="menuitem"
            (click)="logout()">
            Sair
          </button>
        </div>
        }
      </div>
      } @else {
      <div class="flex items-center gap-1 font-[Montserrat] text-sm font-semibold">
        <a routerLink="/login" class="text-[#42240D] transition hover:text-[#FF5A00]">
          Entre
        </a>
        <span class="text-[#8A817A]">ou</span>
        <a routerLink="/register" class="text-[#42240D] transition hover:text-[#FF5A00]">
          Cadastre-se
        </a>
      </div>
      }
    </nav>
  </div>
</header>
