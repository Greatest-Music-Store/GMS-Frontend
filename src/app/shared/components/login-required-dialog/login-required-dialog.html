@if(dialog.visible()){

<div class="fixed inset-0 z-9999 flex items-center justify-center bg-black/40">

    <div class="bg-white p-6 rounded-xl shadow-lg w-80 text-center">

        <h2 class="text-lg font-semibold text-[#42240D]">
            Login necessário
        </h2>

        <p class="mt-2 text-sm text-gray-600">
            Você precisa estar logado para realizar essa ação.
        </p>

        <div class="mt-4 flex justify-between gap-2">

            <button
                class="flex-1 cursor-pointer bg-gray-200 rounded p-2 text-black hover:bg-gray-300"
                (click)="dialog.close()">

                Cancelar

            </button>

            <a
                routerLink="/login"
                class="flex-1 cursor-pointer bg-[#FF5A00] hover:bg-[#df4e00] text-white rounded p-2 text-center"
                (click)="dialog.close()">

                Login

            </a>

        </div>

    </div>

</div>

}
